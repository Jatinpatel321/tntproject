buildscript {

    ext {
        buildToolsVersion = "35.0.0"
        minSdkVersion = 23
        compileSdkVersion = 35
        targetSdkVersion = 35
        kotlinVersion = "1.8.22"
    }

    repositories {
        google()
        mavenCentral()
    }

    dependencies {
        classpath("com.android.tools.build:gradle:8.6.1")
        classpath("com.facebook.react:react-native-gradle-plugin")
        classpath("org.jetbrains.kotlin:kotlin-gradle-plugin:1.8.22")
    }

}

subprojects { subproject ->
    subproject.afterEvaluate {
        def isShimProject = subproject.name == "baseReactShim"
        def isReactAndroid = subproject.name == "ReactAndroid"
        def isAndroidModule = subproject.plugins.hasPlugin("com.android.library") || subproject.plugins.hasPlugin("com.android.application")
        def hasImplementation = subproject.configurations.findByName("implementation") != null
        if (!isShimProject && !isReactAndroid && isAndroidModule && hasImplementation) {
            subproject.dependencies.add("implementation", project(":baseReactShim"))
        }
    }
}